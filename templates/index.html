<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>TaskFlow Manager</title>
</head>
<body>
    <div class="content">
        <h1>TaskFlow Dashboard</h1>
        
        <table>
            <tr>
                <th>Task</th>
                <th>Added</th>
                <th>Actions</th>
            </tr>
            {% for task in tasks %}
            <tr>
                <td>{{ task.content }}</td>
                <td>{{ task.date_created.strftime('%b %d') }}</td>
                <td>
                    <a href="/update/{{task.id}}" class="update-btn">Edit</a>
                    <a href="/delete/{{task.id}}" class="delete-btn">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </table>

        <form action="/" method="POST" class="add-form">
            <input type="text" name="content" placeholder="Enter new task...">
            <button type="submit">Add Task</button>
        </form>
    </div>
</body>
</html>
