{% extends 'base.html' %}
{% block body %}
    <div class="flex justify-between items-center mb-10">
        <h1 class="text-3xl font-black bg-gradient-to-r from-sky-400 to-indigo-400 bg-clip-text text-transparent italic">TaskFlow.</h1>
        <span class="bg-sky-500/10 text-sky-400 text-[10px] px-3 py-1 rounded-full font-bold uppercase tracking-widest">Enterprise v1.0</span>
    </div>

    <div class="space-y-4 mb-10">
        {% for task in tasks %}
        <div class="flex items-center justify-between p-5 rounded-2xl bg-white/5 border border-white/5 hover:border-sky-500/30 transition-all group shadow-sm">
            <div class="flex items-center gap-4">
                <a href="/done/{{task.id}}" class="w-6 h-6 rounded-lg border-2 border-sky-500/40 flex items-center justify-center hover:bg-sky-500 transition-all">
                    {% if task.status == 1 %}<i class="fas fa-check text-[10px] text-white"></i>{% endif %}
                </a>
                <span class="{{ 'line-through text-slate-500 italic' if task.status == 1 else 'text-slate-100 font-semibold' }}">
                    {{ task.content }}
                </span>
            </div>
            <div class="flex gap-4 opacity-0 group-hover:opacity-100 transition-opacity">
                <a href="/update/{{task.id}}" class="text-slate-500 hover:text-sky-400"><i class="fas fa-edit"></i></a>
                <a href="/delete/{{task.id}}" class="text-slate-500 hover:text-rose-500"><i class="fas fa-trash-alt"></i></a>
            </div>
        </div>
        {% endfor %}
    </div>

    <form action="/" method="POST" class="relative group">
        <input type="text" name="content" placeholder="Launch a new task..." required 
            class="w-full bg-slate-950/60 border border-slate-800 rounded-2xl py-5 pl-6 pr-28 outline-none focus:border-sky-500 transition-all text-sm font-medium">
        <button type="submit" class="absolute right-3 top-3 bottom-3 bg-white text-slate-950 font-black px-6 rounded-xl text-[11px] uppercase tracking-tighter hover:bg-sky-400 transition-all">
            Deploy
        </button>
    </form>
{% endblock %}
