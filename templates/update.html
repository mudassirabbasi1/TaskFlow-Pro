{% extends 'base.html' %}

{% block title %}Update Task{% endblock %}

{% block body %}
    <h1>Update Task</h1>
    
    <form action="/update/{{task.id}}" method="POST" class="add-form">
        <input type="text" name="content" id="content" value="{{task.content}}" required>
        <button type="submit">Save</button>
    </form>
    
    <div style="margin-top: 20px; text-align: center;">
        <a href="/" style="color: var(--text-dim); text-decoration: none; font-size: 0.9rem;">← Back to Dashboard</a>
    </div>
{% endblock %}
