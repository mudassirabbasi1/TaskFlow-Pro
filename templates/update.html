{% extends 'base.html' %}
{% block body %}
    <h1 class="text-2xl font-black text-center mb-8 text-sky-400">Edit Task</h1>
    <form action="/update/{{task.id}}" method="POST" class="flex flex-col gap-4">
        <input type="text" name="content" value="{{task.content}}" required 
            class="w-full bg-slate-950/60 border border-slate-800 rounded-2xl py-5 px-6 outline-none focus:border-sky-500 transition-all text-sm">
        <button type="submit" class="w-full bg-sky-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-sky-500 transition-all">
            Update Workflow
        </button>
    </form>
    <div class="mt-6 text-center">
        <a href="/" class="text-slate-500 text-xs font-bold uppercase tracking-widest hover:text-white transition-colors">Discard Changes</a>
    </div>
{% endblock %}
